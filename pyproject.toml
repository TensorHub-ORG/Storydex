# Storydex 后端工具配置（WP-0.5 引入）。
#
# 当前只用来配置 ruff 的 F811（重复定义）规则升为 error，
# 防止再次出现 01 §八.3 + 07 §5.1 描述的"后定义静默覆盖前定义"问题。
#
# 不在这里固化项目级别的 build/wheel 配置——后端用 venv +
# requirements.txt，不需要 PEP 517 build。

[tool.ruff]
# 后端代码全部用 Python 3.9（仓库自带 .python39 venv）
target-version = "py39"
line-length = 120
extend-exclude = [
    "apps/desktop/node_modules",
    "apps/frontend/node_modules",
    ".python39",
    ".claude",
    ".codex",
]

[tool.ruff.lint]
# 默认规则 + 显式开 F811。
select = ["E", "F", "W"]

# WP-0.5: F811（重复定义、后定义静默覆盖前定义）必须当 error。
extend-select = ["F811"]

# 其它噪音规则可以按需关，这里先不动。
ignore = []
