name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build and verify release assets without publishing
        required: true
        default: true
        type: boolean

concurrency:
  group: storydex-windows-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  quality-gate:
    uses: ./.github/workflows/quality-gate.yml

  release-windows:
    name: Build and publish Windows release
    needs: quality-gate
    runs-on: windows-latest
    environment: ${{ (github.event_name == 'push' || inputs.dry_run == false) && 'production' || 'release-dry-run' }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      NPM_CONFIG_UNICODE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use UTF-8 console
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          $OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          chcp 65001

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            apps/frontend/package-lock.json
            apps/desktop/package-lock.json

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Node dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          $OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          npm ci --prefix apps/frontend
          npm ci --prefix apps/desktop

      - name: Resolve release metadata
        id: metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          $OutputEncoding = [System.Text.UTF8Encoding]::new($false)

          $package = Get-Content -Raw -LiteralPath "apps/desktop/package.json" | ConvertFrom-Json
          $version = [string]$package.version
          if (-not $version) {
            throw "apps/desktop/package.json does not define a version."
          }

          $metadataVersion = [string]$package.build.extraMetadata.version
          if ($metadataVersion -and $metadataVersion -ne $version) {
            throw "build.extraMetadata.version ($metadataVersion) does not match package version ($version)."
          }

          $tag = "v$version"
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -ne $tag) {
            throw "Release tag '$env:GITHUB_REF_NAME' does not match apps/desktop/package.json version '$tag'."
          }

          $outputs = @{
            version = $version
            tag = $tag
            setup_name = "StorydexSetup-x64-$version.exe"
            blockmap_name = "StorydexSetup-x64-$version.exe.blockmap"
            unpacked_zip_name = "Storydex-win-unpacked.zip"
            release_name = "Storydex $tag"
          }

          foreach ($entry in $outputs.GetEnumerator()) {
            "$($entry.Key)=$($entry.Value)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Validate release configuration
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm --prefix apps/desktop run check:encoding
          npm --prefix apps/desktop run check:release
          npm --prefix apps/desktop run test:update-feed

      - name: Require Windows code-signing certificate
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($name in @("CSC_LINK", "CSC_KEY_PASSWORD")) {
            if (-not (Get-Item "Env:$name" -ErrorAction SilentlyContinue).Value) {
              throw "Missing required Windows signing secret: $name"
            }
          }

      - name: Prepare embedded Python
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          $OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/bootstrap_python39.ps1 -InstallRequirements

      - name: Build Windows package
        shell: cmd
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          STORYDEX_REQUIRE_SIGNING: ${{ (github.event_name == 'push' || inputs.dry_run == false) && '1' || '0' }}
        run: |
          chcp 65001
          npm --prefix apps/desktop run package:win

      - name: Verify Windows code signatures
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        shell: pwsh
        env:
          STORYDEX_SETUP_NAME: ${{ steps.metadata.outputs.setup_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $targets = @(
            "apps/desktop/release/win-unpacked/Storydex.exe",
            "apps/desktop/release/$env:STORYDEX_SETUP_NAME"
          )
          foreach ($target in $targets) {
            if (-not (Test-Path -LiteralPath $target)) {
              throw "Signed release target not found: $target"
            }
            $signature = Get-AuthenticodeSignature -LiteralPath $target
            if ($signature.Status -ne "Valid") {
              throw "Invalid Authenticode signature for $target: $($signature.Status) $($signature.StatusMessage)"
            }
            Write-Host "Verified signature: $target [$($signature.SignerCertificate.Subject)]"
          }
          $updateConfigPath = "apps/desktop/release/win-unpacked/resources/app-update.yml"
          if (-not (Test-Path -LiteralPath $updateConfigPath)) {
            throw "Packaged updater configuration not found: $updateConfigPath"
          }
          $updateConfig = Get-Content -Raw -LiteralPath $updateConfigPath
          if ($updateConfig -notmatch "(?m)^publisherName:") {
            throw "app-update.yml does not contain publisherName; downloaded installer signatures would not be verified."
          }

      - name: Prepare release assets
        id: release
        shell: pwsh
        env:
          STORYDEX_VERSION: ${{ steps.metadata.outputs.version }}
          STORYDEX_SETUP_NAME: ${{ steps.metadata.outputs.setup_name }}
          STORYDEX_BLOCKMAP_NAME: ${{ steps.metadata.outputs.blockmap_name }}
          STORYDEX_UNPACKED_ZIP_NAME: ${{ steps.metadata.outputs.unpacked_zip_name }}
        run: |
          $ErrorActionPreference = "Stop"
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          $OutputEncoding = [System.Text.UTF8Encoding]::new($false)

          $releaseDir = Join-Path (Resolve-Path ".").Path "release-assets"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $unpackedSource = Join-Path (Resolve-Path ".").Path "apps\desktop\release\win-unpacked"
          $unpackedTarget = Join-Path $releaseDir "Storydex-win-unpacked"
          if (Test-Path $unpackedTarget) {
            Remove-Item -LiteralPath $unpackedTarget -Recurse -Force
          }
          Copy-Item -LiteralPath $unpackedSource -Destination $unpackedTarget -Recurse -Force

          $desktopReleaseDir = Join-Path (Resolve-Path ".").Path "apps\desktop\release"
          $setupSource = Join-Path $desktopReleaseDir $env:STORYDEX_SETUP_NAME
          $blockmapSource = Join-Path $desktopReleaseDir $env:STORYDEX_BLOCKMAP_NAME
          $latestSource = Join-Path $desktopReleaseDir "latest.yml"
          if (-not (Test-Path $setupSource)) {
            Get-ChildItem -LiteralPath $desktopReleaseDir | Format-Table -AutoSize | Out-String | Write-Host
            throw "Expected installer was not produced: $setupSource"
          }
          if (-not (Test-Path $blockmapSource)) {
            Get-ChildItem -LiteralPath $desktopReleaseDir | Format-Table -AutoSize | Out-String | Write-Host
            throw "Expected blockmap was not produced: $blockmapSource"
          }
          if (-not (Test-Path $latestSource)) {
            Get-ChildItem -LiteralPath $desktopReleaseDir | Format-Table -AutoSize | Out-String | Write-Host
            throw "Expected auto-update metadata was not produced: $latestSource"
          }

          Copy-Item -LiteralPath $setupSource -Destination (Join-Path $releaseDir $env:STORYDEX_SETUP_NAME) -Force
          Copy-Item -LiteralPath $blockmapSource -Destination (Join-Path $releaseDir $env:STORYDEX_BLOCKMAP_NAME) -Force
          Copy-Item -LiteralPath $latestSource -Destination (Join-Path $releaseDir "latest.yml") -Force

          Compress-Archive -LiteralPath $unpackedTarget -DestinationPath (Join-Path $releaseDir $env:STORYDEX_UNPACKED_ZIP_NAME) -CompressionLevel Optimal -Force

          $names = @(
            $env:STORYDEX_SETUP_NAME,
            $env:STORYDEX_UNPACKED_ZIP_NAME,
            $env:STORYDEX_BLOCKMAP_NAME,
            "latest.yml"
          )
          $hashLines = foreach ($name in $names) {
            $file = Join-Path $releaseDir $name
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $file
            "$($hash.Hash)  $name"
          }
          Set-Content -LiteralPath (Join-Path $releaseDir "SHA256SUMS.txt") -Value $hashLines -Encoding ASCII

          $notesTarget = Join-Path $releaseDir "RELEASE_NOTES.md"
          $versionedNotes = Join-Path (Resolve-Path ".").Path "apps\desktop\build\release-notes-v$($env:STORYDEX_VERSION).md"
          if (Test-Path $versionedNotes) {
            Copy-Item -LiteralPath $versionedNotes -Destination $notesTarget -Force
          } else {
            @(
              "# Storydex v$($env:STORYDEX_VERSION) Windows Release",
              "",
              "- Installer: ``$($env:STORYDEX_SETUP_NAME)``",
              "- Portable unpacked bundle: ``$($env:STORYDEX_UNPACKED_ZIP_NAME)``",
              "- Checksums: ``SHA256SUMS.txt``"
            ) | Set-Content -LiteralPath $notesTarget -Encoding utf8
          }

          $outputs = @{
            notes_path = "release-assets/RELEASE_NOTES.md"
            setup_path = "release-assets/$($env:STORYDEX_SETUP_NAME)"
            zip_path = "release-assets/$($env:STORYDEX_UNPACKED_ZIP_NAME)"
            blockmap_path = "release-assets/$($env:STORYDEX_BLOCKMAP_NAME)"
            latest_path = "release-assets/latest.yml"
            sums_path = "release-assets/SHA256SUMS.txt"
          }

          foreach ($entry in $outputs.GetEnumerator()) {
            "$($entry.Key)=$($entry.Value)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Generate build manifest and dependency inventory
        shell: pwsh
        run: |
          node scripts/generate_release_metadata.cjs --release-dir=release-assets --version=${{ steps.metadata.outputs.version }} --test-summary="Reusable quality gate passed"
          $lines = Get-ChildItem -LiteralPath release-assets -File | Where-Object Name -ne "SHA256SUMS.txt" | Sort-Object Name | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
            "$($hash.Hash)  $($_.Name)"
          }
          Set-Content -LiteralPath release-assets/SHA256SUMS.txt -Value $lines -Encoding ASCII

      - name: Publish GitHub Release
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.release_name }}
          body_path: ${{ steps.release.outputs.notes_path }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.release.outputs.setup_path }}
            ${{ steps.release.outputs.zip_path }}
            ${{ steps.release.outputs.blockmap_path }}
            ${{ steps.release.outputs.latest_path }}
            ${{ steps.release.outputs.sums_path }}
            release-assets/BUILD_MANIFEST.json
            release-assets/DEPENDENCIES.json

      - name: Publish update feed to VPS
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        shell: pwsh
        env:
          DEPLOY_HOST: ${{ secrets.STORYDEX_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.STORYDEX_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.STORYDEX_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.STORYDEX_DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.STORYDEX_DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.STORYDEX_DEPLOY_KNOWN_HOSTS }}
          SETUP_NAME: ${{ steps.metadata.outputs.setup_name }}
          BLOCKMAP_NAME: ${{ steps.metadata.outputs.blockmap_name }}
        run: |
          $ErrorActionPreference = "Stop"
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          $OutputEncoding = [System.Text.UTF8Encoding]::new($false)

          foreach ($name in @("DEPLOY_HOST","DEPLOY_PORT","DEPLOY_USER","DEPLOY_PATH","DEPLOY_SSH_KEY")) {
            if (-not (Get-Item "Env:$name" -ErrorAction SilentlyContinue).Value) {
              throw "Missing required secret: $name"
            }
          }

          $sshDir = Join-Path $env:RUNNER_TEMP "storydex-deploy-ssh"
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
          $keyPath = Join-Path $sshDir "id_deploy"
          $knownHostsPath = Join-Path $sshDir "known_hosts"

          # Write private key with LF line endings (OpenSSH requires it).
          $keyText = $env:DEPLOY_SSH_KEY -replace "`r`n", "`n"
          if (-not $keyText.EndsWith("`n")) { $keyText += "`n" }
          [System.IO.File]::WriteAllText($keyPath, $keyText, (New-Object System.Text.UTF8Encoding($false)))

          # Lock down key permissions so ssh does not refuse it.
          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /grant:r "$($env:USERNAME):(R)" | Out-Null

          $port = $env:DEPLOY_PORT
          if (-not $port) { $port = "22" }

          # Host key verification: use pinned known_hosts if provided, else accept-new.
          if ($env:DEPLOY_KNOWN_HOSTS) {
            $khText = $env:DEPLOY_KNOWN_HOSTS -replace "`r`n", "`n"
            [System.IO.File]::WriteAllText($knownHostsPath, $khText, (New-Object System.Text.UTF8Encoding($false)))
            $hostKeyOpts = @("-o", "UserKnownHostsFile=$knownHostsPath", "-o", "StrictHostKeyChecking=yes")
          } else {
            $hostKeyOpts = @("-o", "UserKnownHostsFile=$knownHostsPath", "-o", "StrictHostKeyChecking=accept-new")
          }

          $sshCommon = @("-i", $keyPath, "-P", $port) + $hostKeyOpts
          $target = "$($env:DEPLOY_USER)@$($env:DEPLOY_HOST)"
          $remoteDir = $env:DEPLOY_PATH.TrimEnd("/")

          $files = @(
            @{ local = "release-assets/$($env:SETUP_NAME)";     remote = $env:SETUP_NAME },
            @{ local = "release-assets/$($env:BLOCKMAP_NAME)";  remote = $env:BLOCKMAP_NAME }
          )

          foreach ($f in $files) {
            if (-not (Test-Path -LiteralPath $f.local)) {
              throw "Release asset not found for upload: $($f.local)"
            }
          }

          # Ensure remote directory exists.
          $sshArgs = @("-i", $keyPath, "-p", $port) + $hostKeyOpts + @($target, "mkdir -p '$remoteDir'")
          & ssh @sshArgs
          if ($LASTEXITCODE -ne 0) { throw "Failed to ensure remote directory: $remoteDir" }

          foreach ($f in $files) {
            $scpArgs = @("-i", $keyPath, "-P", $port) + $hostKeyOpts + @($f.local, "$target`:$remoteDir/$($f.remote)")
            Write-Host "Uploading $($f.local) -> $remoteDir/$($f.remote)"
            & scp @scpArgs
            if ($LASTEXITCODE -ne 0) { throw "Upload failed for $($f.local)" }
          }

          # latest.yml is uploaded under a temporary name and atomically renamed last.
          $latestTemporary = "latest.yml.$($env:GITHUB_RUN_ID).tmp"
          $latestScpArgs = @("-i", $keyPath, "-P", $port) + $hostKeyOpts + @("release-assets/latest.yml", "$target`:$remoteDir/$latestTemporary")
          & scp @latestScpArgs
          if ($LASTEXITCODE -ne 0) { throw "Upload failed for latest.yml" }
          $replaceArgs = @("-i", $keyPath, "-p", $port) + $hostKeyOpts + @($target, "mv -f '$remoteDir/$latestTemporary' '$remoteDir/latest.yml'")
          & ssh @replaceArgs
          if ($LASTEXITCODE -ne 0) { throw "Atomic latest.yml replacement failed" }

          $publicBase = "https://updates.septemc.com/storydex/windows"
          $latestResponse = Invoke-WebRequest -UseBasicParsing -Headers @{ "Cache-Control" = "no-cache" } -Uri "$publicBase/latest.yml?run=$env:GITHUB_RUN_ID"
          $publishedLatest = if ($latestResponse.Content -is [byte[]]) {
            [System.Text.Encoding]::UTF8.GetString($latestResponse.Content)
          } else {
            [string]$latestResponse.Content
          }
          if ($publishedLatest -notmatch "(?m)^version:\s*$([regex]::Escape('${{ steps.metadata.outputs.version }}'))\s*$") {
            throw "Published latest.yml version mismatch"
          }
          if ($publishedLatest -notmatch "(?m)^path:\s*$([regex]::Escape($env:SETUP_NAME))\s*$") {
            throw "Published latest.yml installer path mismatch"
          }
          foreach ($name in @($env:SETUP_NAME, $env:BLOCKMAP_NAME)) {
            $response = Invoke-WebRequest -UseBasicParsing -Method Head -Uri "$publicBase/$name"
            if ($response.StatusCode -lt 200 -or $response.StatusCode -ge 400) { throw "Published asset unavailable: $name" }
          }

          Remove-Item -LiteralPath $keyPath -Force -ErrorAction SilentlyContinue
          Write-Host "Update feed published to $target`:$remoteDir"
