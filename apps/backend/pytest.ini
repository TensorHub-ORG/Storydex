[pytest]
testpaths = tests
addopts = -ra --strict-markers
asyncio_mode = auto
markers =
    unit: isolated unit tests
    integration: integration tests spanning services or persistence
    contract: HTTP/API and event-stream contract tests
    security: path, secret, authentication, and isolation tests
    performance: deterministic responsiveness and timing tests
    e2e: end-to-end tests using isolated local fixtures
    slow: tests excluded from the fast development loop

